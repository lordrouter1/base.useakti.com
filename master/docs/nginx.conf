# =============================================================
# Akti Master Admin — Configuração Nginx
# Domínio: master.useakti.com
# =============================================================

server {
    listen 80;
    server_name master.useakti.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name master.useakti.com;

    root /var/www/master.useakti.com;
    index index.php;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/master.useakti.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/master.useakti.com-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Logs
    access_log /var/log/nginx/master.useakti.com.access.log;
    error_log  /var/log/nginx/master.useakti.com.error.log;

    # Bloquear acesso a arquivos sensíveis
    location ~* \.(sql|md|env|log|sh)$ {
        deny all;
        return 404;
    }

    # Bloquear acesso direto à pasta app/ e sql/
    location ^~ /app/ {
        deny all;
        return 404;
    }

    location ^~ /sql/ {
        deny all;
        return 404;
    }

    # Permitir acesso a assets estáticos (css, js, imagens, logos)
    location ~* \.(css|js|ico|svg|png|jpg|jpeg|gif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Tudo passa pelo index.php (router)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Variáveis de ambiente (banco master)
        fastcgi_param AKTI_MASTER_DB_HOST  localhost;
        fastcgi_param AKTI_MASTER_DB_PORT  3306;
        fastcgi_param AKTI_MASTER_DB_NAME  akti_master;
        fastcgi_param AKTI_MASTER_DB_USER  root;
        fastcgi_param AKTI_MASTER_DB_PASS  "";
        fastcgi_param AKTI_BASE_DOMAIN     useakti.com;
    }

    # Bloquear arquivos ocultos (ex: .git, .env)
    location ~ /\. {
        deny all;
        return 404;
    }
}
