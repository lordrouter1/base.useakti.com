<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sem Conexão — Portal do Cliente</title>
    <meta name="theme-color" content="#3b82f6">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .offline-container {
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: #3b82f6;
        }
        .offline-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .offline-text {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .offline-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .offline-btn:hover { background: #1d4ed8; }
        .offline-indicator {
            margin-top: 32px;
            padding: 10px 16px;
            border-radius: 8px;
            background: #fef3cd;
            color: #856404;
            font-size: 0.85rem;
            display: none;
        }
        .offline-indicator.show { display: block; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        <h1 class="offline-title">Sem conexão</h1>
        <p class="offline-text">
            Você está sem acesso à internet no momento.
            Verifique sua conexão e tente novamente.
        </p>
        <button class="offline-btn" onclick="location.reload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Tentar novamente
        </button>
        <div class="offline-indicator" id="offlineIndicator">
            ⚡ Quando a conexão voltar, a página será recarregada automaticamente.
        </div>
    </div>
    <script>
        // Auto-reload quando a conexão voltar
        window.addEventListener('online', function() {
            location.reload();
        });

        // Mostrar indicador após 3 segundos
        setTimeout(function() {
            document.getElementById('offlineIndicator').classList.add('show');
        }, 3000);
    </script>
</body>
</html>
