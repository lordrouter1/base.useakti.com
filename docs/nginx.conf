# Nginx configuration for Akti - Gestão em Produção
# VPS deployment on useakti.com with multi-tenant subdomain routing
#
# Place this file at /etc/nginx/sites-available/useakti.com
# and enable with:
#   sudo cp docs/nginx.conf /etc/nginx/sites-available/useakti.com
#   sudo ln -s /etc/nginx/sites-available/useakti.com /etc/nginx/sites-enabled/useakti.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: Disable or remove the default site to avoid conflicts:
#   sudo rm -f /etc/nginx/sites-enabled/default
#
# Requirements:
#   - PHP-FPM installed (e.g. php8.1-fpm)
#   - Application files in /var/www/useakti.com/public
#   - Wildcard DNS *.useakti.com pointing to the VPS IP

# Redirect HTTP to HTTPS for the base domain
server {
    listen 80;
    server_name useakti.com www.useakti.com;
    return 301 https://$host$request_uri;
}

# Redirect HTTP to HTTPS for all subdomains (multi-tenant)
server {
    listen 80;
    server_name *.useakti.com;
    return 301 https://$host$request_uri;
}

# HTTPS — base domain (landing / fallback)
server {
    listen 443 ssl http2;
    server_name useakti.com www.useakti.com;

    ssl_certificate     /etc/letsencrypt/live/useakti.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useakti.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/useakti.com/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Route all requests to index.php (PHP router)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.1-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  AKTI_BASE_DOMAIN useakti.com;
    }

    # Static assets — served directly with long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive directories and files
    location ~ /\.(ht|git) {
        deny all;
    }
    location ~ ^/app/(config|models|controllers)/ {
        deny all;
    }
    location ~ ^/sql/ {
        deny all;
    }
    location ~ ^/docs/ {
        deny all;
    }
}

# HTTPS — wildcard subdomains (multi-tenant clients)
# Each subdomain resolves to a different database via TenantManager
server {
    listen 443 ssl http2;
    server_name *.useakti.com;

    ssl_certificate     /etc/letsencrypt/live/useakti.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useakti.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/useakti.com/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Route all requests to index.php (PHP router)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.1-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  AKTI_BASE_DOMAIN useakti.com;
    }

    # Static assets — served directly with long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive directories and files
    location ~ /\.(ht|git) {
        deny all;
    }
    location ~ ^/app/(config|models|controllers)/ {
        deny all;
    }
    location ~ ^/sql/ {
        deny all;
    }
    location ~ ^/docs/ {
        deny all;
    }
}
